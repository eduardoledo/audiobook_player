name: audiobook_player
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  audio_meta: ^2.0.0
  file_picker: ^11.0.2
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  uuid: ^4.5.2
  path: ^1.9.1
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  get_it: ^9.2.1
  equatable: ^2.0.8
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3
  just_audio_media_kit: ^2.1.0
  media_kit_libs_audio: ^1.0.7
  media_kit: ^1.2.6
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.2.3
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#1A1A1A"
  image: "assets/splash.png"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
